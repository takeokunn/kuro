name: CI

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test on ${{ matrix.os }} (Emacs ${{ matrix.emacs-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        emacs-version: ['29.1', '29.4', '30.1']
        rust:
          - stable

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9  # stable
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo index
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache Cargo build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-

      - name: Install Emacs
        uses: jcs090218/setup-emacs@ffd830bca5865932d99c3d179263d8b0ebdd00c0  # v3
        with:
          version: ${{ matrix.emacs-version }}

      - name: Run cargo fmt --check
        run: cargo fmt --all -- --check

      - name: Run cargo clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Build documentation (no warnings)
        run: cargo doc --workspace --no-deps 2>&1 | { ! grep -q "^warning:"; }

      # Security audit - if emacs crate 0.19.0 is flagged by RUSTSEC,
      # document the advisory in .cargo/audit.toml with a rationale comment.
      - name: Security audit
        run: |
          cargo install cargo-audit --quiet
          cargo audit
        continue-on-error: false

      - name: Run cargo test
        run: cargo test --workspace

      - name: Run cargo test (release)
        run: cargo test --workspace --release

      - name: Run Elisp ERT tests
        run: make test-elisp

      - name: Run package-lint
        run: |
          emacs -Q --batch \
            --eval "(progn (require 'package) (push '(\"melpa\" . \"https://melpa.org/packages/\") package-archives) (package-initialize) (package-refresh-contents) (package-install 'package-lint))" \
            --eval "(require 'package-lint)" \
            -f package-lint-batch-and-exit \
            emacs-lisp/kuro.el

      - name: Install tmux
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update -qq && sudo apt-get install -y tmux
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install tmux
          fi

      - name: Run E2E tests
        run: bash test/shell/run-e2e.sh
        if: runner.os != 'Windows'

  test-windows:
    name: Test on Windows (WSL2)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup WSL
        uses: Vampire/setup-wsl@3b46b44374d5d0ae94654c45d114a3ed7a0e07a8  # v5
        with:
          distribution: Ubuntu-24.04

      - name: Install Rust toolchain (WSL)
        shell: wsl-bash {0}
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable

      - name: Run cargo test
        shell: wsl-bash {0}
        run: |
          source $HOME/.cargo/env
          cargo test --workspace

  coverage:
    name: Code coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9  # stable
        with:
          toolchain: stable

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage report
        run: cargo tarpaulin --workspace --timeout 300 --out Xml

      - name: Upload to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238  # v4.6.0
        with:
          file: ./cobertura.xml

  fuzz:
    name: Fuzz (nightly, regression check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9  # nightly
        with:
          toolchain: nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - name: Run fuzz targets (30s each)
        run: |
          cargo fuzz run fuzz_advance -- -max_total_time=30 -runs=1000
          cargo fuzz run fuzz_kitty_params -- -max_total_time=30 -runs=1000
          cargo fuzz run fuzz_apc_payload -- -max_total_time=30 -runs=1000
          cargo fuzz run fuzz_decode_png -- -max_total_time=30 -runs=1000
        working-directory: fuzz

  release:
    name: Build Release Artifacts
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact-name: libkuro_core.so
            release-name: libkuro_core-linux-x86_64.so
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact-name: libkuro_core.dylib
            release-name: libkuro_core-macos-x86_64.dylib
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact-name: libkuro_core.dylib
            release-name: libkuro_core-macos-aarch64.dylib
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9  # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo index
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache Cargo build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-${{ matrix.target }}-

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact
        run: |
          cd target/${{ matrix.target }}/release
          mv ${{ matrix.artifact-name }} ${{ matrix.release-name }}

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: kuro-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.release-name }}
          retention-days: 90

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844  # v1
        with:
          files: |
            target/${{ matrix.target }}/release/${{ matrix.release-name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
