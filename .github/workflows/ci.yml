name: CI

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main, develop]

jobs:
  check:
    name: nix flake check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3  # v6.0.0
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Run nix flake check
        run: nix flake check

  e2e:
    name: E2E tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3  # v6.0.0
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Run E2E tests
        run: nix develop --command bash test/shell/run-e2e.sh

  coverage:
    name: Code coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3  # v6.0.0
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Generate coverage report
        run: nix develop --command cargo-tarpaulin --workspace --timeout 300 --out Xml
        continue-on-error: true
      - uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24  # v5.4.3
        with:
          file: ./cobertura.xml

  fuzz:
    name: Fuzz (nightly, regression check)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3  # v6.0.0
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Run fuzz targets (30s each)
        run: |
          nix develop .#fuzz --command bash -c "
            cd fuzz
            cargo fuzz run fuzz_advance -- -max_total_time=30 -runs=1000
            cargo fuzz run fuzz_kitty_params -- -max_total_time=30 -runs=1000
            cargo fuzz run fuzz_apc_payload -- -max_total_time=30 -runs=1000
            cargo fuzz run fuzz_decode_png -- -max_total_time=30 -runs=1000
          "

  release:
    name: Release (${{ matrix.release-name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            release-name: libkuro_core-linux-x86_64.so
          - os: macos-latest
            release-name: libkuro_core-macos-aarch64.dylib
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3  # v6.0.0
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build release
        run: nix develop --command cargo build --release
      - name: Collect artifact
        run: |
          find target/release -maxdepth 1 -name "libkuro_core.*" -not -name "*.d" \
            | head -1 \
            | xargs -I{} cp {} ${{ matrix.release-name }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: kuro-${{ matrix.release-name }}
          path: ${{ matrix.release-name }}
          retention-days: 90
      - uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844  # v1
        with:
          files: ${{ matrix.release-name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
