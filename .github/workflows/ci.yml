name: CI

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test on ${{ matrix.os }} (Emacs ${{ matrix.emacs-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        emacs-version: ['29.1', '29.4', '30.1', '31.1']
        rust:
          - stable

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-

      - name: Install Emacs
        uses: jcs090218/setup-emacs@v3
        with:
          version: ${{ matrix.emacs-version }}

      - name: Run cargo fmt --check
        run: cargo fmt --all -- --check

      - name: Run cargo clippy
        run: cargo clippy --workspace -- -D warnings

      # Security audit - if emacs crate 0.19.0 is flagged by RUSTSEC,
      # document the advisory in .cargo/audit.toml with a rationale comment.
      - name: Security audit
        run: |
          cargo install cargo-audit --quiet
          cargo audit
        continue-on-error: false

      - name: Run cargo test
        run: cargo test --workspace

      - name: Run cargo test (release)
        run: cargo test --workspace --release

      - name: Install tmux
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update -qq && sudo apt-get install -y tmux
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install tmux
          fi

      - name: Run E2E tests
        run: bash test/run-e2e.sh
        if: runner.os != 'Windows'

  test-windows:
    name: Test on Windows (WSL2)
    runs-on: windows-latest
    defaults:
      run:
        shell: wsl-bash {0}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain (WSL)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Run cargo test
        run: |
          source $HOME/.cargo/env
          cargo test --workspace

  coverage:
    name: Code coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage report
        run: cargo tarpaulin --workspace --timeout 120 --out Xml

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./cobertura.xml

  fuzz:
    name: Fuzz (nightly, regression check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - name: Run fuzz targets (30s each)
        run: |
          cargo fuzz run fuzz_advance -- -max_total_time=30 -runs=1000
          cargo fuzz run fuzz_kitty_params -- -max_total_time=30 -runs=1000
          cargo fuzz run fuzz_apc_payload -- -max_total_time=30 -runs=1000
          cargo fuzz run fuzz_decode_png -- -max_total_time=30 -runs=1000
        working-directory: fuzz

  release:
    name: Build Release Artifacts
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact-name: libkuro_core.so
            release-name: libkuro_core-linux-x86_64.so
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact-name: libkuro_core.dylib
            release-name: libkuro_core-macos-x86_64.dylib
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact-name: libkuro_core.dylib
            release-name: libkuro_core-macos-aarch64.dylib
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-${{ matrix.target }}-

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact
        run: |
          cd target/${{ matrix.target }}/release
          mv ${{ matrix.artifact-name }} ${{ matrix.release-name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kuro-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.release-name }}
          retention-days: 90

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            target/${{ matrix.target }}/release/${{ matrix.release-name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
